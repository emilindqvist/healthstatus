<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">healthstatus status dashboard screenshot</title>
  <desc id="desc">A dark terminal dashboard with bordered CPU, memory, battery, disks, network, and top process panels.</desc>
  <defs>
    <style>
      .bg { fill: #07090d; }
      .panel { fill: #0d1117; stroke: #56606d; stroke-width: 1.4; }
      .panel-cyan { stroke: #22d3ee; }
      .panel-green { stroke: #22c55e; }
      .panel-yellow { stroke: #eab308; }
      .panel-blue { stroke: #60a5fa; }
      .panel-red { stroke: #f87171; }
      .text { fill: #d6dde8; font: 16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .dim { fill: #7d8590; font: 16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .title { fill: #f3f4f6; font: 700 16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .cyan { fill: #22d3ee; }
      .green { fill: #22c55e; }
      .yellow { fill: #eab308; }
      .red { fill: #f87171; }
      .bar-bg { fill: #1f2937; }
      .bar-green { fill: #22c55e; }
      .bar-yellow { fill: #eab308; }
    </style>
  </defs>
  <rect class="bg" width="1280" height="760" rx="14"/>

  <rect class="panel" x="24" y="24" width="1232" height="56" rx="8"/>
  <text class="title cyan" x="48" y="58">healthstatus</text>
  <text class="text" x="176" y="58">user@workstation</text>
  <text class="dim" x="420" y="58">Linux</text>
  <text class="dim" x="640" y="58">x86_64</text>
  <text class="dim" x="760" y="58">uptime 5h 58m</text>
  <text class="title" x="1060" y="58">Status (1/3)</text>

  <rect class="panel panel-cyan" x="24" y="104" width="560" height="250" rx="8"/>
  <text class="title cyan" x="48" y="137">CPU (8c/16t) - load 0.06</text>
  <g class="text" transform="translate(48 170)">
    <text y="0">c00</text><rect class="bar-bg" x="44" y="-13" width="96" height="14" rx="3"/><rect class="bar-green" x="44" y="-13" width="10" height="14" rx="3"/><text x="154" y="0">2.6%</text>
    <text x="270" y="0">c01</text><rect class="bar-bg" x="314" y="-13" width="96" height="14" rx="3"/><rect class="bar-green" x="314" y="-13" width="4" height="14" rx="3"/><text x="424" y="0">0.5%</text>
    <text y="28">c02</text><rect class="bar-bg" x="44" y="15" width="96" height="14" rx="3"/><rect class="bar-green" x="44" y="15" width="5" height="14" rx="3"/><text x="154" y="28">0.8%</text>
    <text x="270" y="28">c03</text><rect class="bar-bg" x="314" y="15" width="96" height="14" rx="3"/><rect class="bar-green" x="314" y="15" width="4" height="14" rx="3"/><text x="424" y="28">0.5%</text>
    <text y="56">c04</text><rect class="bar-bg" x="44" y="43" width="96" height="14" rx="3"/><rect class="bar-green" x="44" y="43" width="6" height="14" rx="3"/><text x="154" y="56">0.9%</text>
    <text x="270" y="56">c05</text><rect class="bar-bg" x="314" y="43" width="96" height="14" rx="3"/><rect class="bar-green" x="314" y="43" width="4" height="14" rx="3"/><text x="424" y="56">0.4%</text>
    <text y="84">c06</text><rect class="bar-bg" x="44" y="71" width="96" height="14" rx="3"/><rect class="bar-green" x="44" y="71" width="5" height="14" rx="3"/><text x="154" y="84">0.7%</text>
    <text x="270" y="84">c07</text><rect class="bar-bg" x="314" y="71" width="96" height="14" rx="3"/><rect class="bar-green" x="314" y="71" width="4" height="14" rx="3"/><text x="424" y="84">0.5%</text>
    <text y="112">c08</text><rect class="bar-bg" x="44" y="99" width="96" height="14" rx="3"/><rect class="bar-green" x="44" y="99" width="5" height="14" rx="3"/><text x="154" y="112">0.7%</text>
    <text x="270" y="112">c09</text><rect class="bar-bg" x="314" y="99" width="96" height="14" rx="3"/><rect class="bar-green" x="314" y="99" width="4" height="14" rx="3"/><text x="424" y="112">0.4%</text>
    <text y="140">c10</text><rect class="bar-bg" x="44" y="127" width="96" height="14" rx="3"/><rect class="bar-green" x="44" y="127" width="5" height="14" rx="3"/><text x="154" y="140">0.8%</text>
    <text x="270" y="140">c11</text><rect class="bar-bg" x="314" y="127" width="96" height="14" rx="3"/><rect class="bar-green" x="314" y="127" width="5" height="14" rx="3"/><text x="424" y="140">0.7%</text>
  </g>

  <rect class="panel panel-green" x="604" y="104" width="430" height="250" rx="8"/>
  <text class="title green" x="628" y="137">Memory</text>
  <text class="text" x="628" y="180">RAM</text>
  <rect class="bar-bg" x="680" y="164" width="210" height="18" rx="4"/><rect class="bar-green" x="680" y="164" width="20" height="18" rx="4"/>
  <text class="green" x="910" y="180">9.2%</text><text class="dim" x="628" y="212">728.5M / 7.7G</text>
  <text class="text" x="628" y="266">Swap</text>
  <rect class="bar-bg" x="680" y="250" width="210" height="18" rx="4"/>
  <text class="green" x="910" y="266">0.0%</text><text class="dim" x="628" y="298">0.0B / 2.0G</text>

  <rect class="panel panel-yellow" x="1054" y="104" width="202" height="250" rx="8"/>
  <text class="title yellow" x="1078" y="137">Battery</text>
  <text class="dim" x="1078" y="180">no battery</text>
  <text class="dim" x="1078" y="208">detected</text>

  <rect class="panel panel-blue" x="24" y="374" width="1232" height="132" rx="8"/>
  <text class="title" x="48" y="407">Disks</text>
  <g class="text" transform="translate(48 440)">
    <text y="0">/</text><rect class="bar-bg" x="210" y="-14" width="270" height="16" rx="4"/><rect class="bar-green" x="210" y="-14" width="4" height="16" rx="4"/><text x="510" y="0">1.3%</text><text class="dim" x="610" y="0">12.9G / 1006.9G</text>
    <text y="32">/data</text><rect class="bar-bg" x="210" y="18" width="270" height="16" rx="4"/><rect class="bar-yellow" x="210" y="18" width="161" height="16" rx="4"/><text x="510" y="32">59.5%</text><text class="dim" x="610" y="32">276.4G / 464.8G</text>
    <text y="64">/backup</text><rect class="bar-bg" x="210" y="50" width="270" height="16" rx="4"/><rect class="bar-yellow" x="210" y="50" width="161" height="16" rx="4"/><text x="510" y="64">59.5%</text><text class="dim" x="610" y="64">276.4G / 464.8G</text>
  </g>

  <rect class="panel panel-green" x="24" y="526" width="560" height="142" rx="8"/>
  <text class="title green" x="48" y="559">Network</text>
  <text class="dim" x="48" y="594">iface</text><text class="dim" x="178" y="594">up</text><text class="dim" x="320" y="594">down</text>
  <text class="text" x="48" y="626">lo</text><text class="text" x="178" y="626">0.0B/s</text><text class="text" x="320" y="626">0.0B/s</text>

  <rect class="panel panel-red" x="604" y="526" width="652" height="142" rx="8"/>
  <text class="title red" x="628" y="559">Top processes</text>
  <text class="dim" x="628" y="594">pid</text><text class="dim" x="720" y="594">process</text><text class="dim" x="1030" y="594">rss</text>
  <text class="text" x="628" y="626">1234</text><text class="text" x="720" y="626">editor</text><text class="text" x="1030" y="626">165.4M</text>
  <text class="text" x="628" y="654">2345</text><text class="text" x="720" y="654">healthstatus</text><text class="text" x="1030" y="654">23.4M</text>

  <rect class="panel" x="24" y="690" width="1232" height="46" rx="8"/>
  <text class="text" x="48" y="720">[1] Status   [2] Details   [3] Sensors   [tab] next   [q] quit</text>
</svg>
